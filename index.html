  function fitGridNames(){
    var spans=root.querySelectorAll(".as-grid td.namecol .as-knm");
    for(var i=0;i<spans.length;i++){
      var sp=spans[i];
      sp.style.fontSize="";                       // CSS 기본값으로 리셋
      var avail=sp.clientWidth, natural=sp.scrollWidth;
      if(avail>0 && natural>avail+0.5){
        var base=parseFloat(getComputedStyle(sp).fontSize)||10.5;
        var size=Math.max(8, base*avail/natural); // 비율 축소, 최소 8px
        sp.style.fontSize=size.toFixed(2)+"px";
      }
    }
  }

  function buildAppIcon(){
    APP_ICON_PNG=APP_ICON_DATA;
    upsertLink("apple-touch-icon",APP_ICON_PNG);
    upsertLink("icon",APP_ICON_PNG,{type:"image/png"});
    updateAppNames();
  }

  render();
  buildAppIcon();

  // 페이지 전체 핀치 줌 / 더블탭 줌 차단 (iOS 사파리 대응)
  try{
    document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, {passive:false});
    document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, {passive:false});
    document.addEventListener('gestureend', function(e){ e.preventDefault(); }, {passive:false});
    document.addEventListener('touchmove', function(e){ if(e.touches && e.touches.length>1){ e.preventDefault(); } }, {passive:false});
    var lastTouchEnd=0;
    document.addEventListener('touchend', function(e){ var now=Date.now(); if(now-lastTouchEnd<=300){ e.preventDefault(); } lastTouchEnd=now; }, {passive:false});
  }catch(_){ }
})();
